/* ── Main Layout ── */
.tl-layout{display:flex;flex:1;overflow:hidden;min-height:0 !important;}

/* ── Sidebar ── */
.tl-sidebar{width:280px;border-right:1px solid rgba(138,117,76,0.2);display:flex;flex-direction:column;flex-shrink:0;background:#151210;overflow:hidden;transition:width 0.3s ease,opacity 0.3s ease;position:relative;z-index:20;min-height:0 !important;}

.tl-events-list{flex:1;overflow-y:auto;padding:0.5rem;min-height:0 !important;max-height:100% !important;}

.tl-ev-item{display:flex;align-items:flex-start;gap:0.4rem;padding:0.4rem 0.5rem;border-radius:0.25rem;cursor:pointer;transition:background 0.2s;border-left:2px solid transparent;font-size:0.7rem;color:#a8a4a0;}

.tl-period-item .pname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-period-item .pdate{font-size:0.5rem;color:#6e6863;white-space:nowrap;}

/* ── Center: Timeline ── */
.tl-center{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-width:0 !important;}
.tl-viewport{flex:1;overflow:auto;position:relative;cursor:grab;background-image:linear-gradient(to right,rgba(212,175,55,0.06) 1px,transparent 1px),linear-gradient(to bottom,rgba(212,175,55,0.03) 1px,transparent 1px);background-size:40px 40px;padding-bottom:12px;}
.tl-viewport.grabbing{cursor:grabbing;}
.tl-viewport::-webkit-scrollbar{width:6px;height:6px;}
.tl-viewport::-webkit-scrollbar-track{background:transparent;}
.tl-viewport::-webkit-scrollbar-thumb{background:rgba(138,117,76,0.3);border-radius:3px;}

.tl-canvas{position:relative;min-width:100%;min-height:100%;}
.tl-axis{position:absolute;top:50%;left:0;right:0;height:2px;background:linear-gradient(to right,transparent 0%,rgba(212,175,55,0.2) 5%,rgba(212,175,55,0.2) 95%,transparent 100%);transform:translateY(-50%);pointer-events:none;}

/* Period lines */
.tl-period-line{position:absolute;height:2px;border-radius:1px;opacity:0.6;pointer-events:none;}
.tl-period-cap{position:absolute;width:3px;height:10px;border-radius:1px;top:50%;transform:translateY(-50%);}
.tl-period-name{position:absolute;font-size:0.5rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;opacity:0.7;pointer-events:none;}

/* Date labels */
.tl-date-label{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none;}

/* Event cards */
.tl-event-wrapper{position:absolute;display:flex;flex-direction:column;align-items:center;pointer-events:none;z-index:1;transition:z-index 0s;}

.tl-spacer{width:1px;margin:0 auto;}

/* Connectors (behind cards) */
.tl-connector{position:absolute;width:1px;pointer-events:none;z-index:0;}

/* ── Overview Bar ── */
.tl-overview{height:56px;background:#1a1614;border-top:1px solid rgba(212,175,55,0.3);flex-shrink:0;position:relative;display:flex;align-items:center;padding:0 1.5rem;gap:0.75rem;z-index:40;margin-top:-12px;border-radius:0.5rem 0.5rem 0 0;box-shadow:0 -5px 20px rgba(0,0,0,0.5);}

.tl-overview-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:32px;background:#d4af37;border-radius:3px;cursor:ew-resize;z-index:2;transition:background 0.15s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.4);}
.tl-overview-handle:hover{background:#e8c84a;}
.tl-overview-handle-grip{display:flex;flex-direction:column;align-items:center;gap:2px;}
.tl-overview-handle-grip span{display:block;width:4px;height:2px;background:rgba(26,22,20,0.5);border-radius:1px;}
.tl-overview-dots{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;}
.tl-overview-dot{position:absolute;width:6px;height:6px;border-radius:50%;top:50%;transform:translate(-50%,-50%);border:1.5px solid #1a1614;}
.tl-overview-period{position:absolute;top:20%;height:60%;border-radius:2px;opacity:0.15;pointer-events:none;}
.tl-overview-right{display:flex;align-items:center;gap:0.5rem;border-left:1px solid rgba(138,117,76,0.3);padding-left:0.75rem;margin-left:0.25rem;flex-shrink:0;}

.tl-overview-btn{font-size:0.55rem;font-weight:700;color:#8a754c;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;background:none;border:none;padding:0;transition:color 0.2s;white-space:nowrap;font-family:'Outfit',sans-serif;}
.tl-overview-btn:hover{color:#d4af37;}

.tl-detail{width:0;overflow:hidden;border-left:1px solid rgba(138,117,76,0.2);background:#151210;flex-shrink:0;transition:width 0.3s ease;display:flex;flex-direction:column;}

.tl-detail-close:hover{color:#d4af37;}
.tl-detail-body{flex:1;overflow-y:auto;padding:1rem;min-height:0 !important;}
.tl-detail-body::-webkit-scrollbar{width:4px;}
.tl-detail-body::-webkit-scrollbar-thumb{background:rgba(138,117,76,0.3);border-radius:2px;}
.tl-detail-body img{width:100%;border-radius:0.5rem;}
.tl-detail-body .d-title{font-size:1.1rem;color:#e8e6e3;margin-bottom:0.25rem;line-height:1.3;}
.tl-detail-body .d-date{font-size:0.7rem;font-weight:700;text-transform:uppercase;margin-bottom:0.5rem;}
.tl-detail-body .d-desc{font-size:0.75rem;color:#a8a4a0;line-height:1.6;margin-bottom:0.75rem;}
.tl-detail-body .d-badge{display:inline-block;font-size:0.55rem;font-weight:700;text-transform:uppercase;padding:0.15rem 0.5rem;border-radius:0.2rem;margin-right:0.3rem;margin-bottom:0.3rem;}

/* ── Image Lightbox ── */
.tl-lightbox{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;}
.tl-lightbox.open{display:flex;}
.tl-lightbox img{max-width:85vw;max-height:85vh;object-fit:contain;border-radius:0.5rem;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
.tl-lightbox-close{position:absolute;top:1rem;right:1rem;background:rgba(26,22,20,0.8);border:none;color:#8a754c;cursor:pointer;width:2rem;height:2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color 0.2s;z-index:10;}
.tl-lightbox-close:hover{color:#d4af37;}

/* Zoom icon on card images */
.tl-event-card .card-img-wrap{position:relative;cursor:pointer;}
.tl-event-card .card-img-wrap .card-zoom{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);opacity:0;transition:opacity 0.2s;}

.tl-event-card .card-img-wrap .card-zoom span{background:rgba(26,22,20,0.8);border-radius:50%;padding:0.25rem;color:#d4af37;font-size:1rem;}

/* ── Responsive ── */
@media(max-width:768px){
    .tl-sidebar{display:none;}
    .tl-detail.open{width:260px;}
}
</style>
